name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - aquipro.html
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Copy aquipro.html to docs/index.html
        run: cp aquipro.html docs/index.html
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html
          git diff --cached --quiet || git commit -m "chore: sync docs/index.html from aquipro.html"
          git push
